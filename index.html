<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Contas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <div>
          <h1>Cadastro de Contas</h1>
          <p class="subtitle">Controle suas contas a pagar com total atualizado automaticamente.</p>
        </div>
        <button id="logoutButton" type="button" class="secondary logout">Sair</button>
      </header>

      <section class="total-card" aria-live="polite">
        <div>
          <span class="card-label">Total das contas</span>
          <small id="totalItens">0 conta cadastrada</small>
        </div>
        <strong id="totalValue">R$ 0,00</strong>
      </section>

      <section class="form-card">
        <h2>Nova conta</h2>
        <form id="contaForm" novalidate>
          <label for="descricao">DESCRICAO_DA_CONTA</label>
          <input id="descricao" name="DESCRICAO_DA_CONTA" type="text" required maxlength="120" />

          <label for="valor">VALOR</label>
          <input id="valor" name="VALOR" type="number" min="0.01" step="0.01" required />

          <label for="dtPagamento">DT_PAGAMENTO</label>
          <input id="dtPagamento" name="DT_PAGAMENTO" type="date" required />

          <label for="observacao">OBSERVACAO</label>
          <textarea id="observacao" name="OBSERVACAO" rows="3" maxlength="300"></textarea>

          <p id="feedback" class="feedback" aria-live="polite"></p>

          <div class="actions">
            <button type="submit">Cadastrar conta</button>
            <button id="clearAll" type="button" class="secondary">Limpar tudo</button>
          </div>
        </form>
      </section>

      <section class="list-card">
        <h2>Contas cadastradas</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>DESCRICAO_DA_CONTA</th>
                <th>VALOR</th>
                <th>DT_PAGAMENTO</th>
                <th>OBSERVACAO</th>
                <th>AÇÕES</th>
              </tr>
            </thead>
            <tbody id="contasBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="auth.js"></script>
    <script src="app.js"></script>
  </body>
</html>
